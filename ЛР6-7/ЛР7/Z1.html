<!DOCTYPE html>
<html>

<head>
    <style>
        @keyframes changeBackgroundColor {
            from {
                background-color: orange;
            }

            to {
                background-color: green;
            }
        }

        div {
            width: 100px;
            height: 100px;
            background-color: orange;
            border-radius: 50%;
            animation-name: changeBackgroundColor;
            animation-duration: 2s;
        }
    </style>
</head>

<body>
    <div></div>
</body>

</html>
