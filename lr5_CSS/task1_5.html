<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Трёхколоночная верстка на float</title>
    <style>
        div {
            margin: 10px;
            border: 1px solid #3498db;
            text-align: center;
            font-family: Arial;
            color: #2980b9;
        }

        #header, #footer {
            background-color: #e3f2fd;
            height: 80px;
            clear: both; 
        }

        #left-sidebar {
            background-color: #f9f9f9;
            float: left; 
            width: 120px;
            height: 300px;

            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        #right-sidebar {
            background-color: #f9f9f9;
            float: right; 
            width: 120px;
            height: 300px;
            writing-mode: vertical-rl;
        }

        #main {
            background-color: #fff;
            height: 300px;
           
            margin-left: 140px; 
            margin-right: 140px;
        }
    </style>
</head>
<body>

    <div id="header">Шапка сайта</div>

    <div id="left-sidebar">Левая колонка</div>
    <div id="right-sidebar">Правая колонка</div>
    
    <div id="main">
        <br><br>Область контента
    </div>

    <div id="footer">Подвал сайта</div>

</body>
</html>
