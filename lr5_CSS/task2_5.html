<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Наложение блоков (Задание 2)</title>
    <style type="text/css">

        .block1 {
            width: 250px;
            background: #ccc; 
            padding: 15px;
            border: solid 2px #333;
            float: left;
            z-index: 1; 
        }

        .block2 {
            width: 250px;
            background: #fc0;
            padding: 15px;
            border: solid 2px #333;
            float: left;
            
            position: relative;
            top: 50px;  
            left: -80px;  
            z-index: 2;  
            opacity: 0.9; 
        }
    </style>
</head>
<body>

    <div class="block1">
        <b>Блок №1 (Нижний слой):</b><br>
        Этот блок зафиксирован в потоке с помощью float: left. Ориентир на этот блок для второго.
    </div>

    <div class="block2">
        <b>Блок №2 (Верхний слой):</b><br>
        Благодаря отрицательному значению во float, у нас получилось быть крутыми.
    </div>

</body>
</html>
