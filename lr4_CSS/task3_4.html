<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3: Виды селекторов CSS</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f9f9f9;
        }

        .container {
            background: white;
            padding: 20px;
            border: 2px solid #ccc;
        }

        .container p {
            color: darkblue;
            margin-top: 10px;
        }

        .container > p {
            font-weight: bold;
            background-color: yellow;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .inner-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed red;
        }
    </style>
</head>
<body>

    <h1>Демонстрация селекторов</h1>

    <div class="container">
        
        <p>Я — прямой ребенок (Дочерний селектор > сделал меня жирным и на желтом фоне).</p>
        
        <div class="inner-box">
            <p>Я — внук, нахожусь внутри .inner-box (Дочерний селектор меня НЕ видит, но Контекстный селектор сделал меня синим).</p>
        </div>

        <p>Я тоже прямой ребенок и тоже буду на желтом фоне!</p>

    </div>

</body>
</html>
